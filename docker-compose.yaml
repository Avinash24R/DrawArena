version: "3.9"

services:
  frontend:
    build : ./frontend
    container_name: drawer_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - drawer_network
  backend:
    build : ./Backend
    container_name: drawer_backend
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=postgres
      - DB_USER=admin
      - DB_PASSWORD=password
      - DB_NAME=drawer_db
      - DB_PORT=5432

    depends_on:
      - postgres
    networks:
      - drawer_network
      - db_network
  postgres:
    image: postgres:16
    container_name: drawer_postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=drawer_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - db_network

  pgadmin:
    image: dpage/pgadmin4
    container_name: drawer_pgadmin
    ports:
      - "5050:80"
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@drawer.com
      - PGADMIN_DEFAULT_PASSWORD=password
    depends_on:
      - postgres
    networks:
      - db_network

volumes:
  postgres_data:

networks:
  drawer_network:
  db_network:
